<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; font-size: 13px; margin: 0; color: #1c2733; }
  header { background: #0f4c81; color: #fff; padding: 10px 12px; font-weight: 700; }
  main { padding: 12px; }
  button { background: #0f4c81; color: #fff; border: 0; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  button.secondary { background: #5b6b7a; }
  button:disabled { opacity: .5; cursor: default; }
  .meta { background: #f2f6fa; border-radius: 6px; padding: 8px; margin: 10px 0; line-height: 1.6; }
  .total { font-size: 20px; font-weight: 700; margin: 10px 0 4px; }
  table { border-collapse: collapse; width: 100%; margin-top: 6px; }
  th, td { border-bottom: 1px solid #dde5ec; padding: 4px 6px; text-align: left; font-size: 12px; }
  td.num { text-align: right; white-space: nowrap; }
  .excluded { color: #a33; }
  .cand { background: #fff8ec; border-radius: 6px; padding: 8px; margin: 6px 0; }
  .cand b { display: block; }
  .warn { color: #7a5b00; font-size: 12px; margin: 3px 0; }
  .err { color: #a33; }
  .soap { white-space: pre-wrap; background: #fafbfc; border: 1px solid #dde5ec; border-radius: 6px; padding: 8px; max-height: 140px; overflow-y: auto; font-size: 12px; }
  .muted { color: #5b6b7a; font-size: 12px; }
  h3 { margin: 14px 0 4px; font-size: 13px; }
</style>
</head>
<body>
<header>halunasu 算定サイドカー <span style="font-weight:400">(PoC)</span></header>
<main>
  <div>
    <button id="btn-extract">画面からカルテを読み取る</button>
    <button id="btn-calc" class="secondary" disabled>算定する</button>
  </div>
  <div id="extract-area" hidden>
    <div class="meta" id="meta"></div>
    <div class="soap" id="soap"></div>
  </div>
  <div id="result-area" hidden>
    <div class="total" id="total"></div>
    <div class="muted" id="result-meta"></div>
    <h3>確定明細</h3>
    <table><tbody id="lines"></tbody></table>
    <h3>確認候補（承認まで合計に入りません）</h3>
    <div id="proposals"></div>
    <h3>警告・確認事項</h3>
    <div id="warnings"></div>
  </div>
  <div id="status" class="muted" style="margin-top:10px"></div>
</main>
<script src="sidepanel.js"></script>
</body>
</html>

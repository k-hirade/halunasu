[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[edge_functions]]
path = "/*"
function = "stg-gate"

[[headers]]
for = "/*"

# Content-Security-Policy は middleware.js が nonce 付きで動的に付与する(本番は 'unsafe-inline' を排除)。
# 静的CSPをここに置くと二重CSP(競合)で nonce/strict-dynamic が無効化されるため、あえて設定しない。
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "no-referrer"
X-Frame-Options = "DENY"
Permissions-Policy = "camera=(), geolocation=(), payment=(), usb=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains"

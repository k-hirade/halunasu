<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="halunasu-platform-api-base-url" content="" />
  <meta name="halunasu-charting-api-base-url" content="" />
  <title>ハルナス カルテ作成</title>
  <style>
    :root {
      --ink: #10213f;
      --muted: #64748b;
      --line: #d9e2ef;
      --bg: #f5f8fb;
      --surface: #ffffff;
      --accent: #0f9f8f;
      --accent-dark: #0b7066;
      --danger: #b42318;
      --success: #087443;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, "Noto Sans JP", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--accent);
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
    }

    .session-chip {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      width: min(1240px, calc(100% - 32px));
      margin: 24px auto 40px;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }

    .panel h1,
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel h1 { font-size: 20px; }

    .stack {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      color: #26364f;
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd7e6;
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15,159,143,0.13);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 42px;
      padding: 10px 14px;
      color: #fff;
      background: var(--ink);
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: #e8eef6;
    }

    button.accent {
      background: var(--accent-dark);
    }

    button:disabled {
      opacity: 0.62;
      cursor: wait;
    }

    .message {
      display: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .message.on { display: block; }
    .message.error { color: var(--danger); background: #fff1f0; border: 1px solid #ffd2cf; }
    .message.success { color: var(--success); background: #ecfdf3; border: 1px solid #abefc6; }

    .encounter-list {
      display: grid;
      gap: 10px;
    }

    .encounter-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
      display: grid;
      gap: 4px;
      cursor: pointer;
      text-align: left;
      color: var(--ink);
    }

    .encounter-item strong {
      font-size: 14px;
    }

    .encounter-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto auto minmax(240px, 1fr);
      gap: 18px;
    }

    .soap {
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
      padding: 14px;
      min-height: 180px;
      line-height: 1.7;
    }

    .soap-editor {
      min-height: 260px;
      line-height: 1.7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .hidden { display: none; }

    @media (max-width: 880px) {
      .topbar { padding: 0 16px; }
      .main {
        width: min(100% - 24px, 1240px);
        grid-template-columns: 1fr;
      }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="operator-gate" id="login-gate">
    <div class="operator-gate-shell">
      <aside class="operator-gate-brand">
        <div class="operator-gate-brand-top">
          <img alt="ハルナス" class="operator-gate-mark" height="56" src="brand/harunas-mark.png" width="56" />
          <span class="operator-gate-wordmark">ハルナス</span>
        </div>

        <div class="operator-gate-pitch">
          <h2>診療の記録を、<br />AI と一緒に。</h2>
          <p>
            診察中の会話をスマホで録音し、診療記録の下書きをその場で作成します。
            医師は内容を確認・修正してから、電子カルテへ転記できます。
          </p>
          <div class="operator-gate-features">
            <div class="operator-gate-feature">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
              <span>診察に集中したまま、その場で書き起こしを確認</span>
            </div>
            <div class="operator-gate-feature">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
              <span>診療記録の下書きを自動作成し、そのまま編集</span>
            </div>
            <div class="operator-gate-feature">
              <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
              <span>確定した記録だけを保存し、操作履歴を残す</span>
            </div>
          </div>
        </div>

        <div class="operator-gate-foot">
          <span>© ハルナス</span>
        </div>
      </aside>

      <section class="operator-gate-form-area">
        <form class="operator-gate-card" id="login-form">
          <div>
            <h1>ログイン</h1>
            <p style="margin-top: 6px;">病院コード、個人ID、パスワードでログインしてください。</p>
          </div>
          <div class="field">
            <label for="organizationCode">病院コード</label>
            <input id="organizationCode" name="organizationCode" autocomplete="organization" placeholder="例: clinic_tokyo_001" required />
          </div>
          <div class="field">
            <label for="loginId">個人ID</label>
            <input id="loginId" name="loginId" autocomplete="username" placeholder="例: yamada" required />
          </div>
          <div class="field">
            <label for="password">ログイン用パスワード</label>
            <div class="field-password">
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="パスワードを入力" required />
              <button aria-label="パスワードを表示" class="password-toggle" data-password-toggle data-target="password" type="button">
                <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>
          <div id="login-message" class="inline-error" role="status" aria-live="polite"></div>
          <div class="operator-gate-actions">
            <button class="btn btn--primary btn--lg" type="submit" id="login-button">ログイン</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <div class="app hidden" id="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>ハルナス カルテ作成</div>
      </div>
      <div id="session-chip" class="session-chip">未ログイン</div>
    </header>

    <main class="main">
      <aside class="stack">
        <section class="panel hidden" id="patient-panel">
          <h2>患者</h2>
          <form id="patient-form" class="stack">
            <div class="field">
              <label for="patientName">患者氏名</label>
              <input id="patientName" name="displayName" required />
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="birthDate">生年月日</label>
                <input id="birthDate" name="birthDate" type="date" />
              </div>
              <div class="field">
                <label for="externalPatientId">患者番号</label>
                <input id="externalPatientId" name="externalPatientId" />
              </div>
            </div>
            <button type="submit" class="accent" id="patient-button">患者を作成</button>
          </form>
        </section>

        <section class="panel hidden" id="list-panel">
          <h2>診療記録</h2>
          <div id="encounter-list" class="encounter-list"></div>
        </section>
      </aside>

      <section class="workspace">
        <section class="panel">
          <h2>診療開始</h2>
          <form id="encounter-form" class="stack">
            <div class="grid-2">
              <div class="field">
                <label for="patientId">患者ID</label>
                <select id="patientId" name="patientId" required></select>
              </div>
              <div class="field">
                <label for="visitReason">主訴</label>
                <input id="visitReason" name="visitReason" />
              </div>
            </div>
            <div class="grid-2">
              <div class="field">
                <label for="facilityId">施設</label>
                <select id="facilityId" name="facilityId"></select>
              </div>
              <div class="field">
                <label for="departmentId">診療科</label>
                <select id="departmentId" name="departmentId"></select>
              </div>
            </div>
            <div class="field">
              <label for="transcript">文字起こし</label>
              <textarea id="transcript" name="transcript"></textarea>
            </div>
            <div id="app-message" class="message" role="status" aria-live="polite"></div>
            <div class="button-row">
              <button type="submit" id="encounter-button">診療記録を作成</button>
              <button type="button" class="secondary" id="refresh-button">更新</button>
            </div>
          </form>
        </section>

        <section class="panel hidden" id="selected-panel">
          <h2>選択中</h2>
          <div class="button-row">
            <button type="button" class="secondary" id="recording-start-button">録音開始</button>
            <button type="button" class="secondary" id="recording-stop-button">録音停止</button>
            <button type="button" class="accent" id="soap-button">SOAP下書き作成</button>
            <button type="button" class="secondary" id="soap-save-button">SOAP保存</button>
            <button type="button" id="soap-approve-button">SOAP承認</button>
          </div>
          <p id="selected-summary"></p>
        </section>

        <section class="panel">
          <h2>SOAP下書き</h2>
          <textarea id="soap-output" class="soap soap-editor" placeholder="SOAP下書きがここに表示されます"></textarea>
        </section>
      </section>
    </main>
  </div>

  <script>
    const state = {
      csrfToken: "",
      session: null,
      patients: [],
      facilities: [],
      departments: [],
      encounters: [],
      selectedEncounterId: "",
      selectedSoapDraftId: ""
    };
    const platformApiBaseUrl = resolveBaseUrl("halunasu-platform-api-base-url", "platformApi");
    const chartingApiBaseUrl = resolveBaseUrl("halunasu-charting-api-base-url", "chartingApi");

    const loginGate = document.querySelector("#login-gate");
    const appShell = document.querySelector("#app-shell");
    const loginButton = document.querySelector("#login-button");
    const patientPanel = document.querySelector("#patient-panel");
    const listPanel = document.querySelector("#list-panel");
    const selectedPanel = document.querySelector("#selected-panel");
    const sessionChip = document.querySelector("#session-chip");
    const encounterList = document.querySelector("#encounter-list");
    const soapOutput = document.querySelector("#soap-output");
    const selectedSummary = document.querySelector("#selected-summary");
    const patientSelect = document.querySelector("#patientId");
    const facilitySelect = document.querySelector("#facilityId");
    const departmentSelect = document.querySelector("#departmentId");

    document.querySelector("#login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      loginButton.disabled = true;
      setLoginMessage("");
      try {
        const response = await postPlatform("/v1/auth/login", {
          organizationCode: form.get("organizationCode"),
          loginId: form.get("loginId"),
          password: form.get("password")
        });
        state.csrfToken = response.csrfToken;
        state.session = response.session;
        sessionChip.textContent = `${response.session.organizationCode} / ${response.session.loginId}`;
        hide(loginGate);
        show(appShell);
        show(patientPanel);
        show(listPanel);
        await loadWorkspace();
      } catch (error) {
        if (state.csrfToken) {
          setMessage("#app-message", error.message, "error");
        } else {
          setLoginMessage(error.message);
        }
      } finally {
        loginButton.disabled = false;
      }
    });

    setupPasswordToggle();

    document.querySelector("#patient-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        const externalPatientId = String(form.get("externalPatientId") || "").trim();
        const response = await postCharting("/v1/charting/patients", {
          displayName: form.get("displayName"),
          birthDate: form.get("birthDate") || undefined,
          externalPatientIds: externalPatientId ? [externalPatientId] : []
        });
        state.patients = [...state.patients, response.patient];
        renderPatients();
        patientSelect.value = response.patient.patientId;
        event.currentTarget.reset();
        setMessage("#app-message", "患者を作成しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });

    document.querySelector("#encounter-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      try {
        const response = await postCharting("/v1/charting/encounters", {
          patientId: form.get("patientId"),
          facilityId: form.get("facilityId") || undefined,
          departmentId: form.get("departmentId") || undefined,
          visitReason: form.get("visitReason") || undefined,
          transcript: form.get("transcript") || undefined
        });
        selectEncounter(response.encounter);
        await refreshEncounters();
        setMessage("#app-message", "診療記録を作成しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });

    document.querySelector("#refresh-button").addEventListener("click", loadWorkspace);
    document.querySelector("#recording-start-button").addEventListener("click", async () => {
      if (!state.selectedEncounterId) return;
      try {
        const response = await postCharting(`/v1/charting/encounters/${state.selectedEncounterId}/recording/start`, {});
        selectEncounter(response.encounter);
        await refreshEncounters();
        setMessage("#app-message", "録音状態にしました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });
    document.querySelector("#recording-stop-button").addEventListener("click", async () => {
      if (!state.selectedEncounterId) return;
      try {
        const response = await postCharting(`/v1/charting/encounters/${state.selectedEncounterId}/recording/stop`, {
          transcript: document.querySelector("#transcript").value
        });
        selectEncounter(response.encounter);
        await refreshEncounters();
        setMessage("#app-message", "文字起こしを保存しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });
    document.querySelector("#soap-button").addEventListener("click", async () => {
      if (!state.selectedEncounterId) return;
      try {
        const transcript = document.querySelector("#transcript").value;
        const response = await postCharting(`/v1/charting/encounters/${state.selectedEncounterId}/mock-soap`, {
          transcript
        });
        state.selectedSoapDraftId = response.soapDraft.soapDraftId;
        soapOutput.value = response.soapDraft.outputText;
        selectEncounter(response.encounter);
        await refreshEncounters();
        setMessage("#app-message", "SOAP下書きを作成しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });
    document.querySelector("#soap-save-button").addEventListener("click", async () => {
      if (!state.selectedEncounterId || !state.selectedSoapDraftId) return;
      try {
        const response = await patchCharting(`/v1/charting/encounters/${state.selectedEncounterId}/soap-drafts/${state.selectedSoapDraftId}`, {
          outputText: soapOutput.value
        });
        soapOutput.value = response.soapDraft.outputText;
        selectEncounter(response.encounter);
        setMessage("#app-message", "SOAP下書きを保存しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });
    document.querySelector("#soap-approve-button").addEventListener("click", async () => {
      if (!state.selectedEncounterId || !state.selectedSoapDraftId) return;
      try {
        const response = await postCharting(`/v1/charting/encounters/${state.selectedEncounterId}/soap-drafts/${state.selectedSoapDraftId}/approve`, {
          outputText: soapOutput.value
        });
        soapOutput.value = response.soapDraft.outputText;
        selectEncounter(response.encounter);
        await refreshEncounters();
        setMessage("#app-message", "SOAP下書きを承認しました。", "success");
      } catch (error) {
        setMessage("#app-message", error.message, "error");
      }
    });

    async function loadWorkspace() {
      await Promise.all([
        refreshPatients(),
        refreshFacilities(),
        refreshDepartments(),
        refreshEncounters()
      ]);
    }

    async function refreshPatients() {
      if (!state.csrfToken) return;
      const response = await getCharting("/v1/charting/patients");
      state.patients = response.patients || [];
      renderPatients();
    }

    async function refreshFacilities() {
      if (!state.csrfToken) return;
      const response = await getCharting("/v1/charting/facilities");
      state.facilities = response.facilities || [];
      renderFacilities();
    }

    async function refreshDepartments() {
      if (!state.csrfToken) return;
      const response = await getCharting("/v1/charting/departments");
      state.departments = response.departments || [];
      renderDepartments();
    }

    async function refreshEncounters() {
      if (!state.csrfToken) return;
      const response = await getCharting("/v1/charting/encounters");
      state.encounters = response.encounters || [];
      encounterList.innerHTML = "";
      for (const encounter of state.encounters) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "encounter-item";
        item.innerHTML = `
          <strong>${escapeHtml(encounter.patientSnapshot?.displayName || encounter.patientId)}</strong>
          <span>${escapeHtml(encounter.status)} / ${escapeHtml(encounter.visitReason || "")}</span>
          <span>${escapeHtml(encounter.encounterId)}</span>
        `;
        item.addEventListener("click", () => selectEncounter(encounter));
        encounterList.append(item);
      }
    }

    function selectEncounter(encounter) {
      state.selectedEncounterId = encounter.encounterId;
      selectedSummary.textContent = `${encounter.status} / ${encounter.encounterId} / ${encounter.patientSnapshot?.displayName || encounter.patientId}`;
      patientSelect.value = encounter.patientId || "";
      facilitySelect.value = encounter.facilityId || "";
      departmentSelect.value = encounter.departmentId || "";
      document.querySelector("#visitReason").value = encounter.visitReason || "";
      document.querySelector("#transcript").value = encounter.transcript || "";
      show(selectedPanel);
      loadSoapDrafts(encounter.encounterId).catch((error) => setMessage("#app-message", error.message, "error"));
    }

    async function loadSoapDrafts(encounterId) {
      const response = await getCharting(`/v1/charting/encounters/${encounterId}/soap-drafts`);
      const drafts = response.soapDrafts || [];
      const latest = drafts[drafts.length - 1];
      state.selectedSoapDraftId = latest?.soapDraftId || "";
      soapOutput.value = latest?.outputText || "";
    }

    function renderPatients() {
      renderOptions(patientSelect, state.patients, {
        empty: "患者を選択",
        value: "patientId",
        label: (patient) => `${patient.displayName} (${patient.patientId})`
      });
    }

    function renderFacilities() {
      renderOptions(facilitySelect, state.facilities, {
        empty: "未指定",
        value: "facilityId",
        label: (facility) => `${facility.displayName} (${facility.medicalInstitutionCode || "code未設定"})`
      });
    }

    function renderDepartments() {
      renderOptions(departmentSelect, state.departments, {
        empty: "未指定",
        value: "departmentId",
        label: (department) => `${department.displayName} (${department.departmentId})`
      });
    }

    function renderOptions(select, items, config) {
      const current = select.value;
      select.innerHTML = "";
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = config.empty;
      select.appendChild(empty);
      for (const item of items) {
        const option = document.createElement("option");
        option.value = item[config.value];
        option.textContent = config.label(item);
        select.appendChild(option);
      }
      if ([...select.options].some((option) => option.value === current)) {
        select.value = current;
      }
    }

    async function postPlatform(path, payload) {
      return requestJson(`${platformApiBaseUrl}${path}`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        credentials: "include",
        body: JSON.stringify(payload)
      });
    }

    async function getCharting(path) {
      return requestJson(`${chartingApiBaseUrl}${path}`, {
        method: "GET",
        credentials: "include"
      });
    }

    async function postCharting(path, payload) {
      return requestJson(`${chartingApiBaseUrl}${path}`, {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-csrf-token": state.csrfToken
        },
        credentials: "include",
        body: JSON.stringify(payload)
      });
    }

    async function patchCharting(path, payload) {
      return requestJson(`${chartingApiBaseUrl}${path}`, {
        method: "PATCH",
        headers: {
          "content-type": "application/json",
          "x-csrf-token": state.csrfToken
        },
        credentials: "include",
        body: JSON.stringify(payload)
      });
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.message || body.error || "request failed");
      }
      return body;
    }

    function resolveBaseUrl(metaName, queryName) {
      const params = new URLSearchParams(window.location.search);
      return String(
        params.get(queryName)
        || document.querySelector(`meta[name='${metaName}']`)?.content
        || ""
      ).replace(/\/$/, "");
    }

    function setMessage(selector, text, kind) {
      const element = document.querySelector(selector);
      element.textContent = text;
      element.className = text ? `message ${kind || ""} on` : "message";
    }

    function setLoginMessage(text) {
      document.querySelector("#login-message").textContent = text || "";
    }

    function show(element) {
      element.classList.remove("hidden");
    }

    function hide(element) {
      element.classList.add("hidden");
    }

    function setupPasswordToggle() {
      document.querySelectorAll("[data-password-toggle]").forEach((button) => {
        const target = document.querySelector(`#${button.dataset.target}`);
        button.addEventListener("click", () => {
          const visible = target.type === "password";
          target.type = visible ? "text" : "password";
          button.classList.toggle("is-visible", visible);
          button.setAttribute("aria-label", visible ? "パスワードを隠す" : "パスワードを表示");
        });
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
